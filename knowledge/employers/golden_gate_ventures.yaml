slug: golden_gate_ventures
employer_name: Golden Gate Ventures (GGV)
tracks:
- venture_capital
headcount_estimate: Mid-tier VC firm; hires 2–4 Analysts/Associates annually across
  investment team. Investment team is 30–40% international. Isabella Chen (SMU MBA
  alum) is VP Investments.
notes: 'Compensation by level (GGV, Singapore, 2024): Analyst (pre-MBA) — SGD 80K
  base + 10–20% bonus, no carry. Associate (post-MBA) — SGD 130K + 20–40% bonus +
  0.25–0.5% carry. Senior Associate — SGD 160K + 30–50% bonus + 0.5–1% carry. VP —
  SGD 200K + 40–60% bonus + 1–1.5% carry (Fund V) + Fund VI carry TBD. Carry is primary
  long-term wealth driver: VP 1–1.5% carry on Fund V estimated ~SGD 300K/year on deployment;
  3x fund return = ~SGD 5.5M over 10-year hold. Partner track (2–3% carry) potential
  SGD 10M+. MBA inflects compensation +60% (Analyst SGD 80K → Associate SGD 130K)
  and unlocks carry.'
last_updated: '2026-04-13'
ep_requirement: EP sponsorship available for junior roles (Analyst/Associate). EP
  is 2-year validity, employer-sponsored; visa tied to employer. Tech.Pass transition
  expected post-promotion when salary exceeds SGD 30K/month (self-sponsored, 5-year
  validity). Partnership-track roles require Singapore PR or citizenship — regulatory
  requirement for foreign partnerships in regulated industries. International candidates
  should plan PR application by years 3–4 of Singapore residency.
application_process: 'Rolling recruitment; no fixed intake season. 2–4 hires/year
  at Analyst/Associate level. MBA increasingly table-stakes for Associate+ roles.
  Preferred backgrounds: ex-founders (60% of hires) or consultants/bankers (40%).
  Thesis specialization in climate tech, fintech, or SaaS valued. Operator experience
  (2–3 years at startup as founder or early employee) accelerates path to Partner
  by 2–3 years. SMU and NUS MBA graduates well-positioned for SEA VC recruiting.'
intake_seasons:
- Rolling
counselor_contact: Isabella Chen — VP Investments, GGV. SMU MBA 2020. Canadian national,
  Singapore PR (Feb 2024). Available for mentoring and speaking engagements. Contact
  via Mr. Vikram Nair.
