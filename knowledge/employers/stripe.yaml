  ops roles: SGD 80–120K (coordinator), SGD 110–160K (specialist). Equity (RSUs/options)
  is a key differentiator vs. banks. Alumni contact: Aditya Mehta, Head of Compliance
  Program APAC (LLM NUS ''18), joined 2020.'
