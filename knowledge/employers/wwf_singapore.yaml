slug: wwf_singapore
employer_name: WWF Singapore
tracks:
- social_impact_nonprofit
- partnerships_business_development
ep_requirement: 'Employment Pass sponsored. Processing: 4–8 weeks. International candidates
  welcome.'
application_process: NGOs hire 2–4 partnership/program roles annually. 60% from non-profit
  background, 40% private sector career-switchers. Salary negotiation limited (budgeted
  annually); comp increases modest at 2–3%/year.
headcount_estimate: ~5,000 staff globally (WWF International); Singapore office is
  regional hub for Southeast Asia operations.
counselor_contact: Ms. Amelia Ooi, Career Counselor - Social Impact & Non-Profit
notes: 'Compensation significantly lower than private sector: Partnership Officer
  SGD 55–70K, Senior Officer/Manager SGD 75–95K, Head of Function SGD 95–130K. No
  equity or profit-sharing; small bonus (1–10%). Mission-driven trade-off. MBA increasingly
  common for Head+ roles; MSc Innovation/Social Entrepreneurship also valued. Most
  NGO professionals accept 3–5 year tenure before exit to private sector. WWF offers
  purpose, flexibility, and international ASEAN exposure. Alumnus: Michael Tan, MSc
  Innovation ''19, Head of Partnerships (ASEAN) since 2023.'
