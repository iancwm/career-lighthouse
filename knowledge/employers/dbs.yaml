notes: DBS offers a formal sabbatical/career break arrangement (up to 2 years) that
  allows mid-career employees to pursue full-time reskilling programs such as SMU
  MITB without full career exit. Alumni Jensen Seah (wealth management, AVP level)
  used this pathway in 2021 to complete MITB full-time before pivoting to crypto BD
  at Crypto.com. Equity and pension preservation during sabbatical may be possible
  — advise students to negotiate terms before departure. This pathway is relevant
  for DBS employees considering fintech, crypto, or tech pivots.
headcount_estimate: '15–20 PM/BA roles/year; 70% internal promotion from analyst pool,
