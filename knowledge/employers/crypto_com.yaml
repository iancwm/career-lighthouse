notes: 'Crypto.com Singapore is a major crypto exchange and institutional platform
  operating under MAS RMO framework. Hiring is highly cyclical: 2021 boom (aggressive
  hiring), 2022 crash (40% global headcount cut post-FTX/Terra Luna), 2023–2025 gradual
  recovery. Institutional BD roles (partnerships with exchanges, funds, banks, fintech
  platforms) are more stable than trading/sales roles during downturns. Token grants
  (CRONOS) are part of compensation — significant upside in bull markets (USD 100K+
  equivalent in 2021), near-worthless in crashes. Regulatory clarity from MAS (RMO
  path) was a key factor in firm survival through 2022. Alumni Jensen Seah (BD Director)
  is a strong contact for institutional BD and MITB-to-crypto pivot narratives. Turnover
  30–40%/year across crypto sector.'
