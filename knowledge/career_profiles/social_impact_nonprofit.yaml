career_type: Social Impact & Non-Profit
match_description: Careers in NGOs, conservation organisations, foundations, and social
  enterprises focused on environmental, social, and governance outcomes. Roles span
  partnership development, program management, policy influence, fundraising, and
  impact measurement. Suits mission-driven candidates willing to accept a compensation
  trade-off relative to private sector, in exchange for purpose, flexibility, and
  international exposure.
match_keywords:
- conservation
- sustainability
- NGO
- non-profit
- social enterprise
- partnerships
- impact
- fundraising
- grant writing
- policy
- stakeholder management
- ESG
- climate
- ASEAN
- social impact
- B-Corp
- impact investing
ep_sponsorship: Generally available at established international NGOs (e.g. WWF).
  Employment Pass sponsored; processing 4–8 weeks.
compass_score_typical: Not a primary filter; mission fit and relevant experience weighted
  more heavily than COMPASS score.
top_employers_smu:
- WWF Singapore
- Conservation International
- The Nature Conservancy
- UNDP
- World Bank
- Bridgespan Group
- Ecosystem Integrity Fund
recruiting_timeline: 'Rolling hiring; 2–4 roles per year per organisation. No fixed
  intake seasons. Application to offer: 4–8 weeks typical.'
international_realistic: true
entry_paths:
- MSc Innovation / Social Entrepreneurship / Sustainability Management
- MBA (for Director/fundraising roles)
- 2–3 years at smaller impact-focused org or startup before tier-1 international NGO
- Private sector career-switcher (mid-career, often post-MBA)
- Climate tech or fintech background with environmental passion
salary_range_2024: 'Program/Partnership Officer: SGD 55–70K; Senior Manager: SGD 75–95K;
  Head of Function: SGD 95–130K; Director+: SGD 150–200K+. Bonus minimal (1–10%).
  No equity.'
typical_background: Mix of non-profit experience (60%) and private sector career-switchers
  (40%). MSc Innovation, sustainability, or social enterprise degrees valued. Country/language
  expertise (e.g. Bahasa Indonesia, Thai) differentiating. Financial literacy (grant
  writing, budgeting) increasingly important at leadership level.
counselor_contact: Ms. Amelia Ooi, Career Counselor - Social Impact & Non-Profit
notes: 'Compensation gap vs. private sector: 30–40% lower at junior levels; converges
  at Director+ (SGD 150–200K+). Long-term thinkers benefit from NGO path; opens doors
  to World Bank, UNDP, bilateral aid orgs. Partnerships roles offer faster leadership
  track than program roles. MSc Innovation preferred over MBA for partnership/program
  roles. Funding volatility (donor dependency) is a structural risk. Potential exit
  paths: impact investor, impact finance firm, social enterprise. Alumnus reference:
  Michael Tan, MSc Innovation ''19, Head of Partnerships (ASEAN), WWF Singapore.'
