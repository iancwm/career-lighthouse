entry_paths: MSc Sustainability → NGO/certification (~70% of graduates); corporate
  ESG (~20%); consulting (~10%). Big 4 consulting highest barrier (MBA + internship
  path preferred).
salary_range_2024:
  ngo_nonprofit_analyst:
    range_sgd: 60000–80000
    bonus: Minimal (3–8%)
    equity: None
    notes: Non-profit/NGO sustainability analyst roles. Mission-driven; 25–35% below
      fintech/banking equivalent.
  certification_body_analyst:
    range_sgd: 70000–95000
    bonus: Performance-based
    equity: None
    notes: B Labs, ISO, LRQA, DNV. Niche but growing segment.
  big4_esg_consulting:
    range_sgd: 80000–120000
    bonus: Standard consulting bonus
    equity: None
    notes: Deloitte, EY, KPMG sustainability practices. Senior roles SGD 110–140K.
  corporate_esg_multinational:
    range_sgd: 100000–150000
    bonus: Corporate bonus structure
    equity: RSUs at some firms
    notes: Unilever, IKEA, DBS corporate ESG teams. Highest comp in sector.
structured:
  salary_min_sgd: 60000
  salary_max_sgd: 80000
career_type: Sustainability & ESG
ep_sponsorship: EP sponsorship is generally available for corporate ESG roles at multinationals
  and Big 4 consulting firms, where structured HR processes support work pass applications.
  NGO and certification body roles are less consistent — smaller organisations may
  lack EP sponsorship infrastructure, and some roles are filled preferentially by
  Singapore citizens or PRs. Candidates targeting EP sponsorship should prioritise
  MNC ESG teams (e.g., DBS, Unilever) or Big 4 sustainability practices.
international_realistic: false
recruiting_timeline: 'Corporate ESG and Big 4 consulting roles follow a structured
  cycle: applications open August–October for January/February starts, with internship-to-full-time
  conversion being the dominant pathway. NGO and certification body roles (B Lab,
  DNV, LRQA) recruit on a rolling basis year-round with shorter hiring cycles of 3–6
  weeks. SMU MSc Sustainability students should target internships in Semester 1 (August–December)
  to secure full-time offers before graduation.'
top_employers_smu:
- DBS Bank (Group Sustainability)
- Deloitte Singapore (Sustainability & Climate)
- EY Singapore (Climate Change & Sustainability Services)
- KPMG Singapore (ESG Advisory)
- Unilever Singapore
- IKEA Southeast Asia
- DNV Singapore
- Bureau Veritas
- B Lab Southeast Asia
- Temasek Sustainability
- GIC (Sustainable Investing)
- WWF Singapore
typical_background: Most entrants hold an undergraduate degree in environmental science,
  business, economics, or engineering, with 0–3 years of prior work experience. SMU
  MSc Sustainability cohorts typically include fresh graduates and early-career professionals
  transitioning from adjacent fields such as finance, supply chain, or public policy.
  Candidates with prior internship exposure to ESG reporting frameworks (GRI, TCFD,
  ISSB) or sustainability certifications (e.g., LEED, CFA ESG Certificate) are notably
  more competitive.
