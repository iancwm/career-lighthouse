notes: 'Case interview preparation is the single largest driver of MBB outcomes —
  more than GPA, more than internships. Students who start prep in August and complete
  50+ cases before November have materially higher offer rates. SMU Consulting Club
  mock rounds are the best free resource; supplement with peer practice and 1–2 paid
  coaches if targeting MBB.

  Singapore office culture: MBB Singapore offices are genuinely international — English
  is the working language. No Mandarin or Malay advantage in office selection (unlike
  some coverage functions in IB). However, Southeast Asian language skills are valued
  for Indonesia, Thailand, Vietnam-focused project work.

  Oliver Wyman note: OW''s Singapore office is primarily financial services consulting.
  Students targeting OW should position financial knowledge and quantitative skills
  prominently; pure generalist profiles are less competitive there vs. at MBB.

  Public sector consulting: Strategy& and Accenture have large Singapore public sector
  practices (government digital transformation, Smart Nation initiatives). These are
  strong paths for international students — public sector projects often have lower
  EP sensitivity than private sector clients (the consulting firm, not the government
  agency, sponsors the EP).

  '
