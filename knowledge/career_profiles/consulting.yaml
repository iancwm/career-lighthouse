ep_sponsorship: 'High at MBB (McKinsey, BCG, Bain) and Tier 2 global firms (Oliver
  Wyman, Strategy&, AT Kearney/Kearney, Roland Berger): these firms have historically
  hired internationally across Singapore offices and have sufficient workforce diversity
  and headcount to clear COMPASS quotas. Medium at the Big 4 consulting arms (Deloitte
  Consulting, KPMG Advisory, PwC Strategy&, EY-Parthenon) — they are large enough
  but are more citizenship-sensitive in Singapore due to large overall headcounts
  that skew local. Low at local boutiques (smaller firms operating on thin margins
  may decline EP cost for junior roles). EP sponsorship at MBB for strong SMU candidates
  is generally NOT an issue — confirm during offer stage but treat it as expected
  rather than uncertain.

  '
compass_score_typical: '50–60 for consulting analyst/associate roles. MBB starting
  salaries (S$90,000–105,000 at analyst level) anchor the salary criterion at 25–30
  pts. Strong university bonus (10 pts for SMU given its accreditation). Most international
  hires at MBB clear COMPASS comfortably. Big 4 advisory analyst roles at lower salary
  bands (S$55,000–70,000) may score 38–45 — workable but tighter. Role classification
  matters: "Management Consultant" (SSOC 2422) is a standard category with established
  precedent; generic "Analyst" roles may face more scrutiny.

  '
