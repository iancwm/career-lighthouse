- McKinsey & Company (Singapore office, SEA practice)
- Boston Consulting Group (BCG Singapore)
- Bain & Company (Singapore office)
- Oliver Wyman (financial services focus)
- Strategy& (part of PwC, strong in public sector and energy)
- Kearney (operations/supply chain focus)
- Roland Berger
- Deloitte Consulting (Monitor Deloitte)
- EY-Parthenon
- PwC Advisory
- KPMG Advisory
- Accenture Strategy (distinct from Accenture Technology)
recruiting_timeline: Applications open March
international_realistic: true
entry_paths:
- Summer associate internship → return offer (primary route; MBB conversion ~60–75%)
- Direct full-time analyst hire (for candidates who didn't intern at target firm)
- Big 4 advisory → MBB lateral (2–3 years, viable with strong client exposure)
- MBA associate hire (career change route; 3–5 years pre-MBA experience expected)
- PhD/specialist hire for advanced analytics or sector specialist roles
salary_range_2024: 'MBB consultant/analyst (Singapore): S$90,000–105,000 base + S$10,000–20,000
  performance bonus. Tier 2 (Oliver Wyman, Strategy&, Kearney): S$75,000–90,000 base.
  Big 4 advisory analyst: S$55,000–70,000 base + variable bonus. Source: SMU career
  centre salary survey 2024 (approximate — verify with current cohort data).

  '
typical_background: 'Consulting hires broadly across all majors — this is deliberate.
  MBB explicitly values diverse academic backgrounds; SMU students from Business,
  Law, Social Sciences, and Information Systems all appear in MBB offers. What matters
  more than major: academic performance (top 20% of class), demonstrated problem-solving
  (case competition wins, research with implications), leadership roles, and case
  interview performance. Quant backgrounds (IS, Applied Math) increasingly valued
  for data-heavy practices.

  '
