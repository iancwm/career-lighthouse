- impact career Singapore
match_cosine: false
structured:
  sponsorship_tier: Medium
  compass_points_typical: Low-to-medium (entry roles may be near EP threshold; mid-senior
    roles comfortably eligible)
  salary_min_sgd: 52000
  salary_max_sgd: 200000
  ep_realistic: true
ep_sponsorship: Employment Pass sponsorship is available at established international
  NGOs such as WWF Singapore. Processing typically takes 4–8 weeks. Salary negotiation
  is limited (budgets are fixed annually), and comp increases are modest (2–3% per
  year), so EP renewal may require proactive planning around salary thresholds. International
  candidates are welcomed, particularly those with regional language skills or country
  expertise.
compass_score_typical: NGO roles tend to score lower on Compass than private-sector
  equivalents due to below-market base salaries and minimal or no bonus/equity. Entry-level
  roles (SGD 52–70K) may fall below MOM EP fixed monthly salary thresholds for newer
  graduates; mid-senior roles (SGD 85–130K) are more comfortably within EP eligibility.
  Students should plan accordingly.
top_employers_smu:
- WWF Singapore
- Conservation International (CI)
- The Nature Conservancy (TNC)
- UNDP Singapore
- World Bank Group (Singapore office)
- Oxfam
- Save the Children
- Ford Foundation (regional)
- Packard Foundation (regional)
recruiting_timeline: 'NGOs hire on a rolling, needs-based basis rather than structured
  graduate recruitment cycles. Openings are posted when headcount is approved (often
  tied to grant cycles or donor funding confirmation). Typical volume: 2–4 partnership
  or programme roles per organisation per year. No fixed campus recruitment season;
  monitor NGO job boards (Idealist, NGO-specific boards, LinkedIn) year-round. Interview
  process is lighter than finance/consulting (2–3 rounds); offer-to-start can be 4–8
  weeks.'
international_realistic: true
entry_paths:
- Programme Officer at a local or regional NGO (2–3 years, broad learning before joining
  tier-1 international)
- Partnership Officer at an international NGO (WWF, CI, TNC) — direct entry for MSc/MBA
  graduates
- Climate tech or social enterprise startup (2–3 years) then lateral move to NGO partnerships
  team
- Mid-career switcher from private sector (consulting, finance, corporate sustainability)
  into Head-of-Function or Director roles
- Foundation or grant-making body (Ford Foundation, Packard) — typically requires
  prior NGO programme experience
salary_range_2024: 'Programme/Partnership Officer: SGD 52–70K base. Senior Officer/Manager:
  SGD 75–95K base. Head of Function: SGD 95–130K base. Director/VP: SGD 130–200K+
  at large international NGOs. Bonuses are minimal (1–10%) and there is no equity
  or profit-sharing. Overall compensation is 30–40% below private-sector equivalents
  at junior levels; the gap narrows significantly at Director level and above. At
  the most senior NGO executive levels, doors open to World Bank/UNDP roles compensated
  at USD 100K+.'
typical_background: MSc Innovation, MSc Sustainability, Social Entrepreneurship, or
  MBA graduates are well-represented. MSc Innovation is considered more directly applicable
  than MBA for partnership/programme roles (systems thinking, stakeholder ecosystems).
  MBA adds value for Director-level fundraising or CFO roles. 60% of hires come from
  other NGOs or foundations; 40% are mid-career private-sector switchers. Regional
  language skills (Bahasa Indonesia, Thai, Vietnamese) and country policy expertise
  are strong differentiators. STEM + environmental passion is a growing niche (climate
  tech crossover).
counselor_contact: ''
notes: 'Based on 65-minute alumni interview with Michael Tan (MSc Innovation ''19,
  SMU), Head of Partnerships at WWF Singapore. Key insight: partnerships roles offer
  faster leadership acceleration than traditional programme/science roles in NGOs,
  and compensation gap vs. private sector closes meaningfully at Director+ levels.
  MSc Innovation preferred over MBA for junior-to-mid NGO roles. Students with strong
  comp motivation should consider impact investing or impact finance as a higher-comp
  alternative with similar purpose alignment. Political risk, funding volatility,
  and donor dependency are real structural challenges students should be counselled
  on explicitly. Follow-up: invite Michael for guest lecture April 2025; develop Impact
  Investing career track separately.'
salary_levels:
- stage: Programme Officer (entry)
  range_sgd: SGD 52,000–55,000 base
  notes: Minimal bonus (~2% for strong performance). Basic health insurance. Total
    comp ~SGD 53K.
- stage: Partnership Officer
  range_sgd: SGD 55,000–70,000 base
  notes: Bonus 3–5%. Medical, dental, gym benefits. Total comp ~SGD 65–70K.
- stage: Senior Partnership Manager / Senior Officer
  range_sgd: SGD 75,000–95,000 base
  notes: Bonus ~5%. Professional development budget (~SGD 2K/year). Team lead responsibilities.
    Total comp ~SGD 89K at upper end.
- stage: Head of Function (e.g. Head of Partnerships)
  range_sgd: SGD 95,000–130,000 base
  notes: Bonus 8–10% performance-based. Pension match (~8%). Conference/travel budget
    (~SGD 5K/year). No equity or RSUs. Total comp ~SGD 119K at upper end.
- stage: Director / VP (large international NGO)
  range_sgd: SGD 130,000–200,000+
  notes: Comp converges with private sector at this level. Some organisations offer
    deferred comp or restricted endowment participation. Opens pathway to World Bank/UNDP
    roles at USD 100K+.
visa_pathway_notes: 'Employment Pass (EP) is the standard work visa for international
  hires at NGOs in Singapore. Large international NGOs (e.g. WWF Singapore) are accredited
  EP sponsors. Processing time is typically 4–8 weeks. Key risk: EP fixed monthly
  salary threshold (currently SGD 5,000/month for new applicants as of 2025) means
  entry-level NGO salaries (SGD 52–55K / ~SGD 4,300–4,600/month) may fall below the
  EP threshold, making direct entry difficult for international graduates without
  bridging experience. Partnership Officer and above roles (SGD 65K+) are more safely
  within EP eligibility. Salary increments in NGOs are modest (2–3%/year), so EP renewal
  salary progression should be monitored carefully. Tech.Pass is not applicable in
  this sector. PR applications are feasible after 2–3 years of EP tenure if salary
  levels are sufficient.'
