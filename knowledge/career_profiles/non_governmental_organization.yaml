career_type: Non Governmental Organization
match_description: For students passionate about conservation, sustainability, social
  impact, or international development who are willing to accept below-market compensation
  in exchange for mission alignment and meaningful work. Particularly suited to those
  considering partnerships, programme, or fundraising roles at international NGOs
  operating in Southeast Asia.
