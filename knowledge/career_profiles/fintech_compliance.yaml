career_type: Fintech Compliance
match_description: For students interested in regulatory compliance, financial crime
  prevention, and in-house legal roles at fintech companies, banks, or regulators.
  Combines legal expertise with operational risk management in a fast-evolving regulatory
  environment.
match_keywords:
- AML
- KYC
- CFT
- compliance
- regulatory
- fintech
- financial crime
- sanctions screening
- FATF
- MAS
- PDPA
- PSA
- in-house counsel
- legal operations
- risk management
- fraud investigation
- LLM
- law
ep_sponsorship: Varies by employer. Fintech firms (Stripe, Wise, Revolut) generally
  competitive on EP sponsorship given talent scarcity. Banks (DBS, OCBC, UOB) typically
  sponsor EP for compliance roles.
compass_score_typical: Not specifically benchmarked; LLM + 2–3 years AML/KYC experience
  at a regulated entity significantly strengthens COMPASS profile.
top_employers_smu:
- Stripe
- DBS
- OCBC
- UOB
- Wise
- Revolut
- MAS
- CSA
recruiting_timeline: Year-round hiring; no fixed intake seasons. First role typically
  at a major bank (DBS, OCBC, UOB) for 2–3 years, then lateral move to fintech or
  in-house counsel. Internship pipelines being developed at NUS/SMU.
international_realistic: true
entry_paths:
- AML Analyst at major Singapore bank (DBS, OCBC, UOB)
- Compliance Officer at regulated financial institution
- Associate Legal Counsel at fintech (post-LLM)
- Regulatory affairs role at MAS or CSA
- Legal ops coordinator at law firm or GC office
salary_range_2024: SGD 95–110K (Associate/entry); SGD 130–156K (Senior); SGD 200–280K+
  (Manager/Head). Equity adds significant upside at funded fintechs.
typical_background: LLM in International Law, Financial Crime, or Regulatory Law preferred
  over JD for compliance specialization. 2–3 years AML/KYC experience at a bank or
  regulated entity is baseline. CCEP, CFCS, or FCA certifications increasingly valued.
  Basic SQL and familiarity with SIEM/e-discovery tools differentiating.
counselor_contact: Dr. Patricia Lim
notes: 'LLM graduates often faster to impact in compliance than JD holders. Recommended
  pathway: (1) LLM with regulatory/AML electives, (2) first role at major bank for
  rigor-building, (3) move to fintech for faster growth. CCEP credential growing in
  importance — equivalent to CFA for this track. Career ceiling: Head of Compliance
  (6–8 years), then lateral to General Counsel, Chief Risk Officer, or regulatory
  body (MAS/CSA). Regulatory relationship-building is a key soft skill. Alumni mentor:
  Aditya Mehta (Stripe, LLM NUS ''18).'
