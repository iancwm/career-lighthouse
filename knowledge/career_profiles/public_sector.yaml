notes: >
  Key insight for international students: statutory board internships are the most
  accessible entry point. Many boards explicitly state they welcome international hires
  for permanent roles — but confirm EP sponsorship intent before accepting an offer, as
  policy can change. EDB in particular has a strong track record of sponsoring
  international hires given its mandate to attract global investment talent.

  GIC vs Temasek: GIC manages foreign reserves (more fixed-income, macro, alternatives);
  Temasek manages direct equity stakes in portfolio companies (more private equity/corporate
  finance oriented). Both are extremely selective — treat them as equivalent to BB IBD in
  terms of competitiveness. Network through SMU's finance alumni pipeline from August.

  MA programmes vs direct hire: MA programmes rotate across functions (2-3 placements)
  and are better for students unsure of their specialisation. Direct analyst hires go
  straight into a specific team — better if you have a clear domain focus. Apply to both
  where offered.
