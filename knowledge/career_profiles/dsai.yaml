  ep_realistic: true
ep_sponsorship: Most private sector employers (tech, fintech, banking) pay above the
  Employment Pass threshold. However, some SMU graduates have been placed on S Pass,
  particularly at smaller firms or for junior roles — verify salary offer carefully.
  Public sector roles via GovTech and ministries are open to Singapore PRs and citizens
  only in most cases.
compass_score_typical: No specific Compass score threshold identified for this track.
  EP eligibility is primarily driven by salary level rather than sector norms here.
