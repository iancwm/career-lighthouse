notes: 'COUNSELOR ACTION REQUIRED (Mr. Vikram Nair, March 2025): Develop dedicated
  visa resources for international MBA candidates. Resources to include: (1) Tech.Pass
  eligibility checklist (salary threshold SGD 30K/month, sector expertise documentation,
  application steps, SGD 2,220 fee); (2) PR application roadmap (5-year residency
  → application → 4–6 month processing → 5-year PR → 2-year wait → citizenship eligibility);
  (3) Multi-country work considerations for international VC/finance professionals
  (India business visa: 6–12 weeks processing; Vietnam; Indonesia); (4) EP vs. Tech.Pass
  comparison table; (5) Partnership-track regulatory requirements by industry. Source
  material: Isabella Chen (GGV) call notes, March 10, 2025.'
