career_type: Venture Capital
match_description: Venture Capital involves sourcing, evaluating, and managing equity
  investments in high-growth startups. SEA VC professionals navigate regional visa
  complexity, multi-country deal flow, and long-horizon carry-based compensation.
  MBA is increasingly table-stakes for Associate+ roles. Thesis specialization (climate
  tech, fintech, SaaS) is valued at senior levels. Long-term wealth is driven by carried
  interest over 10-year fund cycles, not base salary.
