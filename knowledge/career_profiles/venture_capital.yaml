ep_sponsorship: EP sponsorship available at most mid-tier Singapore VC firms for Analyst/Associate
  roles. EP is employer-dependent (2-year validity); job change triggers visa loss
  with brief grace period. Tech.Pass (self-sponsored, 5-year) available once salary
  exceeds SGD 30K/month — typically at Senior Associate or VP level. Partnership-track
  roles at regulated VC firms may require Singapore PR or citizenship (regulatory
  requirement for foreign partnerships). International candidates should research
  partnership requirements on day 1 and plan PR application by years 3–4 of residency.
compass_score_typical: Not specifically benchmarked. Fund experience and sector expertise
  valued more than formal scores.
top_employers_smu:
- Golden Gate Ventures (GGV)
- Insignia Ventures
- Jungle Ventures
recruiting_timeline: Rolling recruitment; no fixed intake season at most SEA VC firms.
  Mid-tier firms (GGV, Insignia, Jungle Ventures) hire 2–4 Analysts/Associates annually.
  MBA candidates well-positioned for Associate roles immediately post-graduation.
  Senior roles (VP+) filled opportunistically. Fund fundraising cycles (typically
  every 3–5 years) drive hiring surges — GGV Fund VI (2025–2026) expected to trigger
  Associate/VP hiring.
international_realistic: true
entry_paths:
- Pre-MBA Analyst (2–3 years deal sourcing) → MBA (SMU/NUS well-regarded for SEA VC)
  → Associate (faster path, +60% comp jump, carry unlocked)
- Pure analyst progression without MBA (slower path to Associate+; carry delayed)
- Operator/founder experience (2–3 years at startup as founder or early employee)
  → VC Associate or Senior Associate (accelerates Partner track by 2–3 years; provides
  deal judgment credibility)
- Consultant or investment banker → VC Associate (40% of hires at mid-tier firms)
- Ex-founder → VC (60% of hires at mid-tier firms; most valued background)
salary_range_2024: 'Singapore VC market (2024): Analyst SGD 75,000–100,000 base +
  0% carry. Associate SGD 120,000–150,000 base + 0.5% carry. Senior Associate SGD
  160,000–190,000 base + 0.75% carry. VP SGD 200,000+ base + 1.5%+ carry. Carry is
  the primary long-term wealth driver over a 10-year fund life. VP-level carry on
  a mid-tier fund (e.g., USD 400M) estimated at SGD 300K+/year on deployment; 3x fund
  return scenario yields SGD 5–6M over fund life. Partner-track carry (2–3%) potential
  SGD 10M+. MBA inflects compensation +60% at Analyst-to-Associate transition and
  unlocks carry eligibility. Source: Isabella Chen (VP, GGV), March 2025.'
typical_background: 60% ex-founders or early startup operators; 40% consultants or
  investment bankers. MBA increasingly table-stakes for Associate+ roles. Thesis specialization
  (climate tech, fintech, SaaS) valued for senior roles. Generalist path offers broader
  deal flow; specialist path offers defensible positioning.
