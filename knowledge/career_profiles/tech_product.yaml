notes: 'LeetCode preparation: SWE interviews at FAANG and most Tier 1 tech require
  medium/hard LeetCode proficiency. Students targeting Google, Meta, or Amazon should
  complete 150+ problems with emphasis on arrays, trees, graphs, and dynamic programming
  — not optional. Blind (teamblind.com) and LeetCode Singapore groups have Singapore-specific
  interview reports that are worth reading.

  Grab / Sea vs. FAANG trade-off: Grab and Sea (Shopee) are genuinely strong employers
  for international students — high EP sponsorship reliability, strong regional brand
  for SEA career paths, and accelerated growth compared to large MNC structures. Students
  who overlook them while only targeting FAANG are making a mistake.

  Product Management reality check: PM roles at FAANG in Singapore are rare for fresh
  graduates without prior PM internship experience at a recognisable company. APM/RPM
  programmes (Google, Meta) are the legitimate fresh-grad path — apply in October,
  expect 5–7 rounds. For students without an APM offer, Grab and Sea''s PM associate
  programmes are the best alternative entry point in Singapore.

  Remote work caveat for EP: If you receive a job offer with the option to work remotely
  from your home country, that arrangement does NOT require or provide an EP. EP is
  only relevant for physically working in Singapore. Make sure your offer includes
  Singapore- based employment before assuming EP sponsorship is in play.

  '
