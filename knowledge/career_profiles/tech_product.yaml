ep_sponsorship: 'High at large tech MNCs with established Singapore entities (Google,
  Meta, Amazon, Microsoft, Apple, Salesforce, SAP): these firms have well-established
  EP processes, dedicated HR for immigration, and diverse enough workforces to absorb
  international hires with minimal COMPASS friction. High at SEA tech unicorns/large
  startups (Grab, Sea/Shopee/Garena, Gojek, Lazada, Stripe Singapore, Atlassian Singapore):
  these firms hire internationally by default and have strong precedent. Medium at
  local tech companies and mid-size software firms: EP cost and process adds friction;
  they may prefer Singapore citizens/PRs for junior roles to avoid overhead. Low at
  early-stage startups (<50 employees): small headcount means COMPASS quota sensitivity
  is highest; EP sponsorship is not assured even if the team wants to hire you — confirm
  before investing in the process.

  '
compass_score_typical: '50–65 for software engineering roles at MNCs (S$80,000–110,000
  starting salaries clear the salary criterion at 25–30 pts; CS/engineering degree
  adds 10 pts; young tech workforce boosts diversity component). Product management
  roles at S$80,000–100,000 score similarly. Data science/ML roles at MNCs often reach
  55–65 given higher salary bands. Junior roles at local companies (S$50,000–65,000)
  may score 35–42 — borderline; confirm employer''s existing headcount composition
  before accepting below-market offers expecting EP.

  '
top_employers_smu:
- Jane Street
recruiting_timeline: 'Tech recruiting is year-round but clusters in two waves: Main
  wave (SWE/PM): applications September–December for summer internships (May–August);
  full-time new grad hiring September–February for August/January starts. Off-cycle:
  many tech MNCs do rolling internship and new grad hiring throughout the year; Grab
  and Sea in particular hire continuously. SMU career centre runs a tech-specific
  networking event in October; SCIS (School of Computing and Information Systems)
  has dedicated industry connections — SCIS students should engage their school''s
  career team in addition to the central career centre. Coding interviews (LeetCode-style)
  are universal at FAANG+ and most tech MNCs — begin prep 2–3 months before target
  application window.

  '
international_realistic: true
entry_paths:
- Software engineering internship → return offer (standard; MNC conversion rate ~50–70%)
- Product management internship → APM/RPM programme (competitive; Google APM, Meta
  RPM etc.)
- Data science / analytics internship → full-time conversion
- Graduate new hire (direct full-time, common at Grab, Sea, and non-FAANG MNCs)
- Bootcamp / portfolio projects → junior SWE (viable for strong portfolios, less so
  for PM roles which typically require degree + internship experience)
- MBA associate PM hire (career-change route into product)
salary_range_2024: SGD 20,000+/month base (Jane Street Singapore, software engineering)
typical_background: 'SWE roles: Computer Science, Information Systems, Engineering
  (any), or Applied Math. Practical coding ability (demonstrated via internships,
  projects, Kaggle, GitHub) matters more than degree name. SMU SCIS graduates (Information
  Systems, CS) well-placed at Grab, Sea, local tech, and increasingly at MNCs. PM
  roles: Any degree; business/IS hybrid backgrounds common. PM internship experience
  is almost a hard requirement for APM programmes at FAANG. Side projects and product
  teardowns in portfolio help differentiate. Data Science roles: Statistics, Applied
  Math, CS, or IS with strong ML coursework. Kaggle competitions and published notebooks
  are genuine differentiators.

  '
