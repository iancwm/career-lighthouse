notes: >
  Key differentiator for international students: BB IBD desks in Singapore cover SEA/APAC
  deals — Thai baht bonds, Indonesian IPOs, regional M&A — so regional language skills
  (Bahasa, Mandarin, Thai) are genuinely valued and should be highlighted explicitly in
  applications, not buried in an "other skills" section.

  COMPASS alert: Students from India and China face the highest quota pressure at local banks
  (DBS/OCBC) because those nationalities often already represent a large share of existing
  hires. This is not discrimination — it is a structural consequence of COMPASS's diversity
  ratio requirement. The workaround is to target BBs where the workforce is more internationally
  distributed and individual scores clear the threshold comfortably.

  CFA Level 1: Sitting CFA L1 before graduation signals commitment and is explicitly mentioned
  in DBS IBD JD as a "plus." It does not substitute for deal experience but removes a box.
