salary_range_2024: 'PM/BA roles at large banks (DBS benchmark): BA SGD 70–85K + 10–15%
  bonus; PM SGD 95–130K + 15–20% bonus; Senior PM SGD 130–170K + 20–25% bonus; Program
  Manager/PMO SGD 150–190K + 25–30% bonus. Source: DBS alumni Sophia Lim, March 2025.'
notes: 'Alumni insight (Sophia Lim, DBS, March 2025): Senior PMs with UAT + user research
  exposure are well-positioned to transition into Product Management. Sophia worked
  with DBS product team on mobile payment redesign (NPS 68); considering PM rotation
  in 2026. Design thinking skills (Stanford Online Design for Change; IDEO immersion)
  cited as key bridge competency. Transition timeline: typically 5–7 years PM experience
  before credible product strategy pivot.'
entry_paths:
- Software Engineer → Product Manager
- Business Analyst → Project Manager → Product Manager (via PM rotation)
- Consulting → Product Strategy → PM
