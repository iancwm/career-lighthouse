notes: >
  If you are exploring the Singapore job market without a clear sector focus, the most
  important first step is narrowing your target. Singapore's job market rewards specificity
  — a student who says "I'm targeting IBD internships at bulge-brackets" will get better
  advice, better referrals, and better interview prep than one who says "I'm open to
  anything in finance."

  Three questions to help you narrow down:
  1. Do you prefer client-facing work (consulting, sales, coverage banking) or
     analytical/execution work (quant, structuring, product)?
  2. Do you prefer fast career progression + high intensity (banking, consulting) or
     steadier pace + broader exposure (public sector, FMCG)?
  3. Do you want to stay in Singapore long-term (public sector, local banks tend to be
     more stable EP sponsors) or use Singapore as a launching pad (BBs, MBB, FAANG
     have global mobility)?

  Your counsellor at the SMU career centre can help you map your background to realistic
  target lists — book an appointment as early as possible in the semester.
