recruiting_timeline: >
  Finance (BB/IBD): applications October–January for summer internships (June–August start).
  Consulting (MBB): applications September–November; case interview prep starts August.
  Tech (FAANG/regional): rolling, but campus recruiting peaks October–February.
  Public sector (statutory boards): MA programmes August–November; direct roles rolling.
  Big 4: applications October–January for July/August start.
  General rule: start building your shortlist in August, apply by November for competitive
  roles. SMU career centre events in September–October are key networking touchpoints.

international_realistic: true

entry_paths:
  - Internship → return offer (primary route across all competitive employers)
  - Management Associate / Graduate Programme (structured rotation; open at banks, GLCs, FMCG)
  - Direct graduate hire (tech, Big 4, some consulting)
  - Lateral after 1-3 years elsewhere (common for career switchers from Big 4 or regional firms)

salary_range_2024: >
  Fresh graduate range varies widely by track:
  - Finance (BB): S$85,000–95,000 base
  - Consulting (MBB): S$85,000–100,000 base
  - Tech (FAANG): S$80,000–110,000 base + stock
  - Public sector (statutory boards): S$55,000–80,000 base
  - Big 4 (advisory/assurance): S$50,000–65,000 base
  - General MNC (FMCG, commercial): S$45,000–65,000 base
  Source: SMU career centre salary survey 2024 (approximate — verify with current cohort data).

typical_background: >
  Depends on target sector. In general, Singapore employers value: strong GPA (top-20%
  cohort or above), demonstrated internship experience (1-2 relevant internships), and
  leadership activities (club president, competition wins, project leadership). For
  international students, regional language skills (Bahasa Indonesia/Malaysia, Mandarin,
  Hindi, Thai) are a concrete differentiator for APAC-coverage roles at any firm type.

