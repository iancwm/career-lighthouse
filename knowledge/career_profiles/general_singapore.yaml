ep_sponsorship: >
  Varies significantly by employer size and industry. Large MNCs (banks, tech firms,
  consulting firms) generally have the headcount and diversity ratios to sponsor EPs
  comfortably. SMEs and startups carry more risk — EP sponsorship is feasible but not
  guaranteed, and COMPASS quota pressure is felt more acutely at smaller employers.
  Rule of thumb: firms with > 200 Singapore-based employees are lower risk for EP
  sponsorship. Always confirm explicitly before accepting any offer.

  COMPASS basics: Your individual score is anchored by salary (roughly 20-25 pts for
  S$60K+), degree qualification (10 pts from a top university), and bonus factors
  (regional language skills, shortage occupations). The employer's quota component
  depends on their workforce nationality ratios — you cannot control this. Target firms
  with internationally distributed workforces.

compass_score_typical: >
  Varies — see specific career track for detailed scoring. For reference:
  - Finance/tech roles at BBs/MNCs: 45-55 pts (comfortably above 40 minimum)
  - Consulting at MBB: 45-55 pts (similar salary band)
  - SME analyst roles (S$45K–55K): 30-38 pts (borderline — individual situation matters)
  If you are unsure of your COMPASS score, use the MOM online checker with your expected
  offer salary to get an estimate before signing.

