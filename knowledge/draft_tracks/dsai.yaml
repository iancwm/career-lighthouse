slug: dsai
track_name: Data Science and Artificial Intelligence
status: published
match_description: For students targeting roles that require deep data science, machine
  learning, or AI domain expertise across tech, finance, healthcare, and public sector
  employers in Singapore.
match_keywords:
- data science
- artificial intelligence
- machine learning
- computer vision
- data analyst
- ML engineer
- NLP
- deep learning
- Python
- SQL
- big data
- analytics
- GovTech
- smart nation
- quantitative researcher
ep_sponsorship: Most private sector employers (tech, fintech, banking) pay above the
  Employment Pass threshold. However, some SMU graduates have been placed on S Pass,
  particularly at smaller firms or for junior roles — verify salary offer carefully.
  Public sector roles via GovTech and ministries are open to Singapore PRs and citizens
  only in most cases.
compass_score_typical: No specific Compass score threshold identified for this track.
  EP eligibility is primarily driven by salary level rather than sector norms here.
top_employers_smu:
- GovTech
- DBS Bank
- GIC
- Grab
- Shopee
- TikTok / ByteDance
- PayPal
- EY
- Merck
- Johnson & Johnson
- Ministry of Defence
- Ministry of Health
recruiting_timeline: No fixed campus recruiting cycle identified for most DSAI roles.
  Private sector hiring is largely rolling/open market via LinkedIn, Glassdoor, and
  company portals. Public sector (GovTech, ministries) typically recruits through
  Careers@Gov on a rolling basis. The Technology in Finance Immersion Programme (TFIP)
  offers a structured entry point for fintech/finance-sector transitions.
international_realistic: true
entry_paths:
- Direct application via company careers portal or LinkedIn (most common)
- GovTech and public sector via Careers@Gov
- Technology in Finance Immersion Programme (TFIP) for fintech/finance transitions
- Graduate programmes at banks (e.g. DBS Technology track)
- Research/academic route via MPhil or PhD leading to industry AI roles
salary_range_2024: 'Private sector entry-level (0–2 years): ~S$88,000/year (~S$7,300/month);
  mid-level (2–5 years): ~S$119,700/year; senior (5–10 years): ~S$172,200/year. Masters
  graduates typically enter at the higher end of the entry band (~S$7,000/month cited
  for SMU MITB AI). Public sector entry (MX13I): ~S$3,800/month (~S$45,600/year),
  rising significantly with performance. Banking and finance subsectors offer the
  best median private sector salaries.'
typical_background: 'SMU MITB (AI track), MPhil Information Systems, or undergraduate
  degrees with strong quantitative/computing components. Key technical skills sought:
  Python, SQL, machine learning, data engineering. AWS or cloud certifications add
  value. CFA or finance domain knowledge is advantageous for banking/fintech data
  science roles.'
counselor_contact: ''
notes: 'Entry-level openings are scarce — only ~11% of Singapore data science job
  postings are junior roles, with ~74% mid-level. Students should position themselves
  above the junior benchmark using project work, internships, or domain credentials.
  Data science on Singapore''s 2026 Shortage Occupation List signals strong long-term
  demand. Private sector salaries substantially outpace public sector starting rates,
  but public sector offers stability and structured progression. Top technical keywords
  in job descriptions: Python, SQL, engineering, analytics, computer science — machine
  learning appears further down than students often expect.'
