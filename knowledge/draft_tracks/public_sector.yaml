match_description: For students targeting Singapore government agencies, statutory
  boards, and GLCs such as GIC, Temasek, MAS, EDB, JTC, HDB, and GovTech — including
  Management Associate programmes, graduate schemes, and direct analyst/officer roles.
  International students should focus on statutory boards and GLCs rather than core
  Civil Service ministries.
