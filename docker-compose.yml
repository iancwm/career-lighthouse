services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - QDRANT_URL=http://qdrant:6333
      - CAREER_PROFILES_DIR=/app/knowledge/career_profiles
      - EMPLOYERS_DIR=/app/knowledge/employers
      - QUERY_LOG_PATH=/app/logs/query_log.jsonl
    volumes:
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    depends_on:
      - qdrant
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* vars are baked into the Next.js build at image build time.
        # For local demo: http://localhost:8000 (browser calls this from the host machine).
        # For AWS/Terraform: rebuild the image with the actual ALB URL, or use runtime
        # config injection (e.g. next.config.js rewrites) — see terraform/ task.
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_data:
