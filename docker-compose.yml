services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      # The upstream image does not ship wget/curl, so probe the TCP listener
      # directly with bash's /dev/tcp support instead.
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - QDRANT_URL=http://qdrant:6333
      - DATA_PATH=/app/data/qdrant
      - SESSIONS_DIR=/app/data/sessions
      - CAREER_PROFILES_DIR=/app/knowledge/career_profiles
      - EMPLOYERS_DIR=/app/knowledge/employers
      - DRAFT_TRACKS_DIR=/app/knowledge/draft_tracks
      - CAREER_TRACKS_REGISTRY_PATH=/app/knowledge/career_tracks.yaml
      - CAREER_PROFILE_HISTORY_DIR=/app/knowledge/career_profiles_history
      - QUERY_LOG_PATH=/app/logs/query_log.jsonl
      - TRACK_PUBLISH_JOURNAL_PATH=/app/logs/track_publish_journal.jsonl
      - TRACK_PUBLISH_LOG_PATH=/app/logs/track_publish_log.jsonl
      - TRACKS_VERSION_PATH=/app/knowledge/.tracks-version
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache
      - UV_CACHE_DIR=/home/appuser/.cache/uv
      - WEB_CONCURRENCY=1
      # Admin key for /api/kb/* and /api/sessions/* endpoints.
      # Set this to a strong random value in production.
      - ADMIN_KEY=${ADMIN_KEY:-}
    volumes:
      # Mount only data directories — the application code and .venv come from
      # the Docker image itself. This keeps builds idempotent: code changes
      # trigger a new image layer; data directories are preserved across restarts.
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
      - api_data:/app/data
      - transformers_cache:/app/.cache
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits — prevents runaway processes from starving the host.
    # Adjust based on your instance type. 2 GB RAM is sufficient for
    # the embedding model + Qdrant embedded client in development.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          memory: 512M

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* vars are baked into the Next.js build at image build time.
        # For local demo: http://localhost:8000 (browser calls this from the host machine).
        # For AWS/Terraform: rebuild the image with the actual ALB URL, or use runtime
        # config injection (e.g. next.config.js rewrites) — see terraform/ task.
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      # Server-side proxy routes inside the web container must reach the API
      # service on the Docker network, not localhost in the browser.
      - ADMIN_API_URL=http://api:8000
      # ADMIN_KEY is a server-side runtime variable for Next.js middleware.
      # It is NOT baked into the client bundle (no NEXT_PUBLIC_ prefix).
      - ADMIN_KEY=${ADMIN_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  qdrant_data:
  transformers_cache:
  api_data:
